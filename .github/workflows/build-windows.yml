name: Build Windows App

on:
  workflow_dispatch:   # Trigger manually from the GitHub Actions tab.
  push:
    tags:
      - 'v*'           # Also trigger on version tags (e.g. v1.0.0).

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout (with LFS for LoRA weights)
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Upgrade pip
        working-directory: CS31_Source_Code_TuohengZhang
        run: python -m pip install --upgrade pip wheel

      - name: Install PyTorch (CPU, Windows ARM64-compatible)
        working-directory: CS31_Source_Code_TuohengZhang
        run: |
          pip install torch==2.6.0 torchvision==0.21.0 `
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install main dependencies
        working-directory: CS31_Source_Code_TuohengZhang
        run: |
          pip install `
            fastapi==0.115.12 uvicorn==0.34.0 pydantic==2.11.1 `
            python-multipart==0.0.20 jinja2==3.1.6 `
            pandas==2.2.3 Pillow==11.1.0 ImageHash==4.3.1 `
            scikit-image==0.24.0 matplotlib==3.9.4 tqdm==4.67.1 `
            lpips==0.1.4 mediapipe scikit-learn

      - name: Install Hugging Face / diffusion stack
        working-directory: CS31_Source_Code_TuohengZhang
        run: |
          pip install diffusers transformers peft safetensors accelerate
          pip install "huggingface_hub>=1.5.0"

      - name: Install InsightFace and ONNX runtime
        working-directory: CS31_Source_Code_TuohengZhang
        run: pip install insightface onnxruntime

      - name: Download InsightFace buffalo_l detection model
        working-directory: CS31_Source_Code_TuohengZhang
        shell: pwsh
        run: |
          # Populates ~/.insightface/models/buffalo_l so the spec can bundle
          # det_10g.onnx. Without this the built app fails all face detection.
          python -c "from insightface.utils.storage import ensure_available; print('buffalo_l ->', ensure_available('models', 'buffalo_l'))"
          python -c "import os; p=os.path.expanduser('~/.insightface/models/buffalo_l/det_10g.onnx'); assert os.path.isfile(p), 'det_10g.onnx missing after download'; print('det_10g.onnx OK:', os.path.getsize(p), 'bytes')"

      - name: Install PyQt6 and PyInstaller
        working-directory: CS31_Source_Code_TuohengZhang
        run: pip install PyQt6 pyinstaller

      - name: Verify source files exist before build
        working-directory: CS31_Source_Code_TuohengZhang
        shell: pwsh
        run: |
          $lora = "models\outcome_v3_512\sd_inpaint_nose_v6\step_10000\pytorch_lora_weights.safetensors"
          $qss  = "desktop\assets\style.qss"
          $ok = $true
          if (Test-Path $lora) {
            $sz = (Get-Item $lora).Length
            Write-Host "LoRA OK: $sz bytes"
          } else {
            Write-Host "ERROR: LoRA not found at $lora"
            $ok = $false
          }
          if (Test-Path $qss) {
            Write-Host "QSS OK"
          } else {
            Write-Host "ERROR: QSS not found at $qss"
            $ok = $false
          }
          if (-not $ok) { exit 1 }

      - name: Build with PyInstaller
        working-directory: CS31_Source_Code_TuohengZhang
        run: pyinstaller desktop/CS31_windows.spec

      - name: Assemble distribution files
        working-directory: CS31_Source_Code_TuohengZhang
        shell: pwsh
        run: |
          $dist = "dist\CS31-1-Rhinoplasty-Prediction-Studio"
          # User-facing files at the dist root; everything else stays in _internal/.
          Copy-Item "desktop\download_sd_model_v3.bat" $dist
          Copy-Item "desktop\dist_files\README.txt"    $dist
          Copy-Item "desktop\dist_files\FIRST_LAUNCH.txt" $dist
          Write-Host "=== Top-level dist contents after assembly ==="
          Get-ChildItem $dist | Select-Object Name, Length | Format-Table

      - name: List bundle data files (diagnostic)
        working-directory: CS31_Source_Code_TuohengZhang
        shell: pwsh
        run: |
          $dist = "dist\CS31-1-Rhinoplasty-Prediction-Studio"
          Write-Host "=== _internal/desktop subdirectory ==="
          if (Test-Path "$dist\_internal\desktop") {
            Get-ChildItem "$dist\_internal\desktop" -Recurse | Select-Object FullName, Length | Format-Table
          } else {
            Write-Host "ERROR: _internal/desktop not found in bundle"
          }

      - name: Verify bundle
        working-directory: CS31_Source_Code_TuohengZhang
        run: python desktop/scripts/verify_bundle_windows.py dist/CS31-1-Rhinoplasty-Prediction-Studio

      - name: Create distribution ZIP
        working-directory: CS31_Source_Code_TuohengZhang
        shell: pwsh
        run: |
          $src  = "dist\CS31-1-Rhinoplasty-Prediction-Studio"
          $dest = "dist\CS31-1-Rhinoplasty-Prediction-Studio-Windows.zip"
          Compress-Archive -Path $src -DestinationPath $dest -CompressionLevel Optimal
          $size = (Get-Item $dest).Length / 1MB
          Write-Host ("ZIP size: {0:N0} MB" -f $size)

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: CS31-Windows-${{ github.run_number }}
          path: CS31_Source_Code_TuohengZhang/dist/CS31-1-Rhinoplasty-Prediction-Studio-Windows.zip
          retention-days: 30
          compression-level: 0   # Already zipped; skip double-compression.
